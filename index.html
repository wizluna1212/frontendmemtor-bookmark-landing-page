<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <a class="header__logo" href="#"
        ><img src="./images/logo-bookmark.svg" alt="Bookmark Logo"
      /></a>
      <nav class="header__nav">
        <a href="#" class="header__link">Features</a>
        <a href="#" class="header__link">Pricing</a>
        <a href="#" class="header__link">Contact</a>
        <a href="#" class="btn btn--login">Login</a>
      </nav>
      <button class="header__menu-btn">
        <img src="./images/icon-hamburger.svg" alt="選單" />
      </button>
    </header>

    <!-- Hero  -->
    <section class="hero"></section>
    <!-- Features 特色 -->
    <section class="features"></section>
    <!-- Download 下載 -->
    <section class="download"></section>

    <!-- FAQ 常見問屜 -->
    <section class="faq"></section>

    <!-- subscribe 訂閱我們 -->
    <section class="subscribe"></section>

    <!-- Footer -->
    <footer class="footer">
      <a class="footer__logo" href="#"
        ><img src="./images/logo-bookmark.svg" alt="Bookmark Logo"
      /></a>

      <nav class="footer__nav">
        <a class="footer__link" href="#">Features</a>
        <a class="footer__link" href="#">Pricing</a>
        <a class="footer__link" href="#">Contact</a>
      </nav>

      <div class="footer__social">
        <a class="footer__social-link" href="">
          <img src="./images/icon-facebook.svg" alt="Bookmark facebook"
        /></a>
        <a class="footer__social-link" href="">
          <img src="./images/icon-twitter.svg" alt="Bookmark twitter"
        /></a>
      </div>
    </footer>
  </body>
</html>
